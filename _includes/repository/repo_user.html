<div class="repo p-2 text-center">
  <a href="https://github.com/{{ include.username }}" target="_blank" rel="noopener" class="d-inline-block p-3 border rounded text-decoration-none">
    <img src="https://github.com/{{ include.username }}.png" alt="{{ include.username }}" class="rounded-circle mb-2" width="96" height="96" loading="lazy">
    <p class="mb-0 font-weight-bold">@{{ include.username }}</p>
    <img src="https://img.shields.io/github/followers/{{ include.username }}?style=flat-square&amp;logo=github" alt="GitHub followers" class="mt-1" loading="lazy">
    <p class="small text-muted mb-0 mt-2">View profile →</p>
  </a>
</div>
